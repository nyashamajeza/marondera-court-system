# render.yaml
services:
  - type: web
    name: marondera-court
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # Will be set in Render dashboard
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: af-south-1
      - key: AWS_BUCKET_NAME
        sync: false
      - key: AWS_BACKUP_BUCKET
        sync: false
      - key: SESSION_SECRET
        generateValue: true  # Render generates a random secret